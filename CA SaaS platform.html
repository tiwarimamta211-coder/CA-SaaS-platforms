<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA SaaS | Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">
                <h2><i class="fas fa-calculator"></i> CA-SaaS</h2>
            </div>
            <ul>
                <li class="active"><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-file-invoice"></i> Reports</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>Sales & Tax Management</h1>
                <div class="user-profile">
                    <span>Admin Panel</span>
                </div>
            </header>

            <!-- Summary Cards -->
            <section class="summary-cards">
                <div class="card">
                    <h3>Total Sales</h3>
                    <p id="total-sales">₹0.00</p>
                </div>
                <div class="card">
                    <h3>Total Tax (GST)</h3>
                    <p id="total-tax">₹0.00</p>
                </div>
                <div class="card highlight">
                    <h3>Net Amount</h3>
                    <p id="net-amount">₹0.00</p>
                </div>
            </section>

            <!-- Sales Entry Form -->
            <section class="entry-section">
                <form id="sales-form">
                    <div class="form-grid">
                        <input type="text" id="client-name" placeholder="Client Name" required>
                        <input type="number" id="base-amount" placeholder="Base Amount (₹)" step="0.01" required>
                        <select id="tax-rate">
                            <option value="0.05">GST 5%</option>
                            <option value="0.12">GST 12%</option>
                            <option value="0.18" selected>GST 18%</option>
                            <option value="0.28">GST 28%</option>
                        </select>
                        <button type="submit" class="btn-add">Add Entry</button>
                    </div>
                </form>
            </section>

            <!-- Table Section -->
            <section class="table-section">
                <div class="table-header">
                    <h3>Recent Transactions</h3>
                    <button id="download-report" class="btn-download">
                        <i class="fas fa-download"></i> Download CSV
                    </button>
                </div>
                <div class="table-container">
                    <table id="sales-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Client</th>
                                <th>Base (₹)</th>
                                <th>GST (₹)</th>
                                <th>Total (₹)</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dynamic Rows Go Here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
